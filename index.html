const SHARED_KEY = 'ullasa_parents_v1';
const FIRESTORE_COLLECTION = 'ullasa_parents';

// ── FIREBASE (cloud sync across ALL devices) ──────────────────────────
// Free tier. All parent data is stored centrally in Firestore so the
// School Admin panel sees EVERY parent, from EVERY phone, in real time.
let _fbDb = null;
function getFirebaseDb() {
  if (_fbDb) return _fbDb;
  try {
    if (window.firebase && window.firebase.apps.length) {
      _fbDb = window.firebase.firestore();
      return _fbDb;
    }
  } catch(e) {}
  return null;
}

// Push ONE parent's record to Firestore (called after every save)
async function fbSaveParent(mobile, data) {
  const db = getFirebaseDb();
  if (!db) return false;
  try {
    await db.collection(FIRESTORE_COLLECTION).doc(mobile).set(data, { merge: true });
    return true;
  } catch(e) { console.log('Firebase save failed:', e); return false; }
}

// Pull ALL parents from Firestore (used by Admin panel)
async function fbLoadAllParents() {
  const db = getFirebaseDb();
  if (!db) return null; // null = Firebase not configured, fall back to local
  try {
    const snap = await db.collection(FIRESTORE_COLLECTION).get();
    const result = {};
    snap.forEach(doc => { result[doc.id] = doc.data(); });
    return result;
  } catch(e) { console.log('Firebase load failed:', e); return null; }
}

// ── SHARED STORAGE (Firebase cloud + localStorage fallback/cache) ────
async function storagePush(users) {
  // Always cache locally first (instant, works offline)
  try {
    const current = await storagePullLocal();
    const merged = { ...current };
    Object.entries(users).forEach(([mobile, u]) => {
      if (!merged[mobile]) { merged[mobile] = u; }
      else {
        const existDone = Object.values(merged[mobile].days||{}).filter(d=>d&&d.status==='done').length;
        const newDone   = Object.values(u.days||{}).filter(d=>d&&d.status==='done').length;
        if (newDone >= existDone) merged[mobile] = { ...merged[mobile], ...u };
      }
    });
    localStorage.setItem(SHARED_KEY, JSON.stringify(merged));
  } catch(e) { console.log('Local push failed', e); }

  // Then push each user to the cloud (best-effort, non-blocking)
  Object.entries(users).forEach(([mobile, u]) => {
    fbSaveParent(mobile, u).catch(()=>{});
  });
}

async function storagePullLocal() {
  try {
    const raw = localStorage.getItem(SHARED_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

// Used by Admin panel: tries cloud first, falls back to local cache
async function storagePull() {
  const cloud = await fbLoadAllParents();
  if (cloud !== null) {
    // Merge cloud data into local cache too, so it works offline next time
    localStorage.setItem(SHARED_KEY, JSON.stringify(cloud));
    return cloud;
  }
  return await storagePullLocal();
}

// ── LOCAL STORAGE ─────────────────────────────────────────────────────
function loadLocal() {
  try { return JSON.parse(localStorage.getItem('ullasa_local_v1')) || {}; } catch { return {}; }
}
function saveLocal(u) {
  localStorage.setItem('ullasa_local_v1', JSON.stringify(u));
  storagePush(u).catch(()=>{});
}
function getCurMobile() { return localStorage.getItem('ullasa_cur_v1') || null; }
function setCurMobile(m) { localStorage.setItem('ullasa_cur_v1', m); }

// ══════════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════════
function App() {
  const [screen, setScreen] = useState('invite'); // invite | reg | tracker | cert | admin
  const [users, setUsers]   = useState(loadLocal);
  const [curMobile, setCur] = useState(getCurMobile);
  const [curDay, setCurDay] = useState(1);
  const [toast, setToast]   = useState(null);
  const [celebrate, setCelebrate] = useState(false);

  const user = curMobile ? users[curMobile] : null;

  // Set page title to ULLASA so WhatsApp/browser tab shows our name, not "Claude"
  useEffect(() => {
    document.title = "ULLASA · Joyful Parenting";
    const metaDesc = document.querySelector('meta[name="description"]') || document.createElement('meta');
    metaDesc.name = "description";
    metaDesc.content = "ULLASA – A 30-Day Joyful Parenting Journey by Kanile, Ranga Miditha & Sahitya School";
    if (!metaDesc.parentNode) document.head.appendChild(metaDesc);
  }, []);

  useEffect(() => {
    const saved = getCurMobile();
    const all   = loadLocal();
    if (saved && all[saved]) {
      setUsers(all);
      setCur(saved);
      setScreen('tracker');
    }
  }, []);

  const save = useCallback((newUsers) => {
    setUsers(newUsers);
    saveLocal(newUsers);
  }, []);

  const findCurDay = useCallback((u) => {
    for (let d = 1; d <= 30; d++) {
      if ((u&&u.days&&u.days['day'+d]&&u.days['day'+d].status) !== 'done') return d;
    }
    return 30;
  }, []);

  const goTracker = (mobile, allUsers) => {
    setCurMobile(mobile);
    setCurMobile(mobile);
    setCurDay(findCurDay(allUsers[mobile]));
    setScreen('tracker');
  };

  const showToast = (msg, type='info') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  return (
    <div style={{fontFamily:"'Quicksand','Segoe UI',sans-serif", background:'#F5F2E6', minHeight:'100vh', position:'relative'}}>
      {screen === 'invite'  && <InvitePage  onBegin={()=>setScreen('reg')} onAdmin={()=>setScreen('admin')} />}
      {screen === 'reg'     && <RegPage     users={users} save={save} goTracker={goTracker} goBack={()=>setScreen('invite')} showToast={showToast} />}
      {screen === 'tracker' && user && <TrackerPage user={user} users={users} curDay={curDay} setCurDay={setCurDay} save={save} findCurDay={findCurDay} goBack={()=>setScreen('invite')} goSwitch={()=>setScreen('reg')} goCert={()=>setScreen('cert')} celebrate={celebrate} setCelebrate={setCelebrate} showToast={showToast} />}
      {screen === 'cert'    && user && <CertPage    user={user} goBack={()=>setScreen('tracker')} />}
      {screen === 'admin'   && <AdminPage  goBack={()=>setScreen('invite')} />}
      {toast && <Toast msg={toast.msg} type={toast.type} />}
      {celebrate && <Confetti onDone={()=>setCelebrate(false)} />}
    </div>
  );
}

// REGISTRATION
// ══════════════════════════════════════════════════════════════════════
function RegPage({ users, save, goTracker, goBack, showToast }) {
  const [name, setName]     = useState('');
  const [mobile, setMobile] = useState('');
  const [age, setAge]       = useState('');
  const [city, setCity]     = useState('');
  const [err, setErr]       = useState('');

  const submit = () => {
    const m = mobile.replace(/\D/g,'');
    if (!name.trim()) { setErr('Please enter your full name.'); return; }
    if (!m || m.length < 10) { setErr('Please enter a valid 10-digit mobile number.'); return; }
    setErr('');
    const newUsers = { ...users };
    if (!newUsers[m]) newUsers[m] = { name: name.trim(), mobile: m, age, city, days: {} };
    save(newUsers);
    setCurMobile(m);
    goTracker(m, newUsers);
  };

  return (
    <div style={{maxWidth:480, margin:'0 auto', padding:16}}>
      <div style={{background:'linear-gradient(135deg,#224012,#437126)', borderRadius:'20px 20px 0 0', padding:'16px 20px', display:'flex', alignItems:'center', gap:12}}>
        <button onClick={goBack} style={{background:'rgba(255,255,255,.15)', border:'none', color:'#fff', width:32, height:32, borderRadius:'50%', fontSize:18, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:900}}>←</button>
        <div>
          <div style={{fontFamily:'Georgia,serif', fontSize:22, color:'#DCAE1D', letterSpacing:2, lineHeight:1}}>ULLASA</div>
          <div style={{fontSize:10, color:'#a5d6a7', fontWeight:700, textTransform:'uppercase', letterSpacing:1}}>Register · Joyful Parenting</div>
        </div>
      </div>
      <div style={{background:'#fff', borderRadius:'0 0 20px 20px', padding:'22px 20px 24px', boxShadow:'0 6px 24px rgba(67,113,38,.15)'}}>
        {[
          {label:'Your Full Name *', val:name, set:setName, ph:'e.g. Suma Prakash', type:'text'},
          {label:'Mobile Number *', val:mobile, set:setMobile, ph:'e.g. 9481986116', type:'tel'},
          {label:'Child\'s Age', val:age, set:setAge, ph:'e.g. 5 years', type:'text'},
          {label:'Village / City', val:city, set:setCity, ph:'e.g. Shidlaghatta', type:'text'},
        ].map((f,i) => (
          <div key={i} style={{marginBottom:14}}>
            <div style={{fontSize:10, fontWeight:900, textTransform:'uppercase', letterSpacing:1, color:'#6b8c42', marginBottom:5}}>{f.label}</div>
            <input type={f.type} value={f.val} onChange={e=>f.set(e.target.value)} placeholder={f.ph}
              style={{width:'100%', border:'2.5px solid #d4e8b8', borderRadius:12, padding:'12px 14px', fontSize:15, fontFamily:"'Quicksand',sans-serif", outline:'none', fontWeight:700, background:'#fcfbf6', color:'#1a2e1a', boxSizing:'border-box'}}
              onKeyDown={e=>e.key==='Enter'&&submit()} />
          </div>
        ))}
        {err && <div style={{color:'#e53935', fontSize:11, fontWeight:900, marginBottom:10, textAlign:'center'}}>{err}</div>}
        <button onClick={submit} style={{display:'block', width:'100%', background:'linear-gradient(135deg,#DCAE1D,#b88c00)', color:'#fff', border:'none', borderRadius:50, padding:15, fontSize:16, fontWeight:900, cursor:'pointer', boxShadow:'0 4px 16px rgba(220,174,29,.4)', borderBottom:'3px solid #8a6400', fontFamily:"'Quicksand',sans-serif"}}>
          ▶ Start My Journey
        </button>

        {/* Returning users */}
        {Object.keys(users).length > 0 && (
          <div style={{marginTop:18}}>
            <div style={{fontSize:10, fontWeight:900, textTransform:'uppercase', letterSpacing:1, color:'#aaa', textAlign:'center', marginBottom:10}}>— Or Continue As —</div>
            {Object.values(users).map(u => {
              const done = Object.values(u.days||{}).filter(d=>d&&d.status==='done').length;
              return (
                <div key={u.mobile} onClick={()=>{setCurMobile(u.mobile); goTracker(u.mobile, users);}}
                  style={{display:'flex', alignItems:'center', gap:12, background:'#f0f9e8', border:'2px solid #c5ddb5', borderRadius:14, padding:'11px 14px', cursor:'pointer', marginBottom:8}}>
                  <div style={{width:36, height:36, borderRadius:'50%', background:'linear-gradient(135deg,#437126,#224012)', color:'#fff', fontWeight:900, fontSize:14, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>{u.name[0]}</div>
                  <div>
                    <div style={{fontSize:13, fontWeight:900, color:'#1a2e1a'}}>{u.name}</div>
                    <div style={{fontSize:11, color:'#6b8c42', fontWeight:700}}>{u.mobile} · {done}/30 done ✅</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// TRACKER
// ══════════════════════════════════════════════════════════════════════
function TrackerPage({ user, users, curDay, setCurDay, save, findCurDay, goBack, goSwitch, goCert, celebrate, setCelebrate, showToast }) {
  const [tab, setTab]           = useState('today'); // today | roadmap | history
  const [emojiPick, setEmojiPick] = useState(0);
  const [note, setNote]         = useState('');
  const [submitting, setSubmitting] = useState(false);

  const days = user.days || {};
  const done = Object.values(days).filter(d=>d&&d.status==='done').length;
  const pct  = Math.round(done/30*100);
  const task = TASKS[curDay-1];
  const dayKey = 'day'+curDay;
  const isDayDone   = (days[dayKey]&&days[dayKey].status) === 'done';
  const isDayMissed = (days[dayKey]&&days[dayKey].status) === 'missed';
  const unlocked = curDay === 1 || (days['day'+(curDay-1)]&&days['day'+(curDay-1)].status) === 'done';

  const submitDay = () => {
    if (!emojiPick) { showToast('Please tap an emoji first.', 'warn'); return; }
    if (!note.trim() || note.trim().length < 3) { showToast('Please add a short reflection.', 'warn'); return; }
    setSubmitting(true);
    const emojiMap = ['','😐','🙂','😊','🥰','🤩'];
    const newDays  = { ...days, [dayKey]: { status:'done', emoji:emojiMap[emojiPick], rating:emojiPick, note:note.trim(), date:new Date().toLocaleDateString('en-IN') } };
    const newUsers = { ...users, [user.mobile]: { ...user, days: newDays } };
    save(newUsers);
    setCelebrate(true);
    setEmojiPick(0); setNote('');
    setTimeout(() => {
      setSubmitting(false);
      if (curDay < 30) setCurDay(curDay+1);
    }, 1800);
  };

  const markMissed = () => {
    const newUsers = { ...users, [user.mobile]: { ...user, days: { ...days, [dayKey]: { status:'missed' } } } };
    save(newUsers);
    showToast('Marked as not today. You can retry anytime.', 'info');
  };

  const retryDay = (d) => {
    const newDays = { ...days }; delete newDays['day'+d];
    const newUsers = { ...users, [user.mobile]: { ...user, days: newDays } };
    save(newUsers); setCurDay(d); setTab('today');
  };

  const EMOJI_LABELS = ['','Still figuring it out','Going okay','Felt good!','Really heartwarming!','Absolutely magical! 🤩'];

  return (
    <div style={{maxWidth:480, margin:'0 auto', paddingBottom:80}}>
      {/* Top bar */}
      <div style={{background:'linear-gradient(135deg,#224012,#437126)', padding:'14px 16px', display:'flex', alignItems:'center', justifyContent:'space-between', boxShadow:'0 4px 14px rgba(34,64,18,.25)'}}>
        <div>
          <div style={{fontFamily:'Georgia,serif', fontSize:18, color:'#DCAE1D', letterSpacing:2, lineHeight:1}}>ULLASA</div>
          <div style={{fontSize:11, color:'#c8e6c9', fontWeight:700, marginTop:1}}>{user.name}</div>
        </div>
        <div style={{display:'flex', gap:8, alignItems:'center'}}>
          <div style={{background:'rgba(255,255,255,.12)', borderRadius:20, padding:'4px 12px', fontSize:13, fontWeight:900, color:'#DCAE1D'}}>{done}/30</div>
          <button onClick={goSwitch} style={{background:'rgba(255,255,255,.15)', border:'none', color:'#fff', padding:'5px 11px', borderRadius:20, fontSize:10, fontWeight:900, cursor:'pointer', fontFamily:"'Quicksand',sans-serif"}}>Switch</button>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{background:'#fff', padding:'12px 16px', boxShadow:'0 2px 8px rgba(0,0,0,.06)'}}>
        <div style={{display:'flex', justifyContent:'space-between', fontSize:10, fontWeight:900, color:'#6b8c42', textTransform:'uppercase', letterSpacing:1, marginBottom:6}}>
          <span>Your Journey</span><span>{pct}%</span>
        </div>
        <div style={{background:'#e0eed4', borderRadius:99, height:10, overflow:'hidden'}}>
          <div style={{height:'100%', borderRadius:99, background:'linear-gradient(90deg,#6ab04c,#437126)', width:pct+'%', transition:'width .5s ease'}}/>
        </div>
        <div style={{fontSize:10, color:'#888', fontWeight:700, textAlign:'center', marginTop:5}}>
          {done >= 30 ? '🏅 All 30 questions complete!' : `${30-done} questions remaining`}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex', background:'#fff', borderBottom:'2px solid #e8f0d8'}}>
        {[['today','📋 Today'],['roadmap','🗺 Roadmap'],['history','📖 History']].map(([t,label]) => (
          <button key={t} onClick={()=>setTab(t)} style={{flex:1, padding:'12px 4px', border:'none', background:'none', fontSize:12, fontWeight:900, cursor:'pointer', color: tab===t ? '#437126' : '#aaa', borderBottom: tab===t ? '3px solid #437126' : '3px solid transparent', fontFamily:"'Quicksand',sans-serif", transition:'all .15s'}}>
            {label}
          </button>
        ))}
      </div>

      {/* TODAY TAB */}
      {tab === 'today' && (
        <div style={{padding:'16px 14px'}}>
          {/* Day nav */}
          <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap:14, marginBottom:12}}>
            <button onClick={()=>curDay>1&&setCurDay(curDay-1)} disabled={curDay<=1} style={{width:34,height:34,borderRadius:'50%',background:curDay<=1?'#e0e0e0':'#1e5c1e',color:'#fff',border:'none',fontSize:18,cursor:curDay<=1?'default':'pointer',fontWeight:900}}>‹</button>
            <div style={{fontFamily:'Georgia,serif',fontSize:20,letterSpacing:2,color:'#224012',minWidth:80,textAlign:'center'}}>DAY {curDay}</div>
            <button onClick={()=>isDayDone&&curDay<30&&setCurDay(curDay+1)} disabled={!isDayDone||curDay>=30} style={{width:34,height:34,borderRadius:'50%',background:(!isDayDone||curDay>=30)?'#e0e0e0':'#1e5c1e',color:'#fff',border:'none',fontSize:18,cursor:(!isDayDone||curDay>=30)?'default':'pointer',fontWeight:900}}>›</button>
          </div>

          {!unlocked ? (
            <div style={{background:'#f5f5f5',border:'3px dashed #ccc',borderRadius:50,padding:24,textAlign:'center',margin:'0 auto',maxWidth:390}}>
              <div style={{fontSize:40,marginBottom:8}}>🔒</div>
              <div style={{fontSize:15,fontWeight:900,color:'#666'}}>Day {curDay} Locked</div>
              <div style={{fontSize:12,color:'#999',marginTop:4}}>Complete Day {curDay-1} first to unlock.</div>
            </div>
          ) : (
            <>
              {/* Balloon */}
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',margin:'0 auto 4px',maxWidth:440}}>
                <div style={{
                  background:'linear-gradient(145deg,#fff9d6,#ffe97a)',
                  border:'4px solid #DCAE1D',
                  borderRadius:'60% 60% 55% 55% / 65% 65% 50% 50%',
                  padding:'22px 26px 30px',width:'92%',maxWidth:390,
                  textAlign:'center',position:'relative',
                  boxShadow:'0 8px 32px rgba(220,174,29,.3)',
                  animation:'floatB 3.5s ease-in-out infinite'
                }}>
                  <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:2,color:'#8a6400',fontWeight:900,marginBottom:6}}>🌿 {task.week}</div>
                  <div style={{fontSize:36,marginBottom:6}}>{task.emoji}</div>
                  <div style={{fontFamily:'Georgia,serif',fontSize:'clamp(16px,4vw,21px)',color:'#3a2800',lineHeight:1.5,marginBottom:6}}>{task.text}</div>
                  <div style={{position:'absolute',bottom:-13,left:'50%',transform:'translateX(-50%)',width:0,height:0,borderLeft:'9px solid transparent',borderRight:'9px solid transparent',borderTop:'13px solid #DCAE1D'}}/>
                </div>
                <div style={{width:2,height:32,background:'repeating-linear-gradient(180deg,#bbb 0 4px,transparent 4px 8px)',margin:'0 auto'}}/>
              </div>

              {isDayDone ? (
                <div style={{textAlign:'center',marginTop:16}}>
                  <div style={{display:'inline-block',background:'linear-gradient(135deg,#aad4aa,#7bbf7b)',color:'#fff',borderRadius:50,padding:'13px 36px',fontSize:16,fontWeight:900}}>✅ Reflected ✨</div>
                  {(days[dayKey]&&days[dayKey].note) && <div style={{marginTop:12,background:'#f0f9e8',borderRadius:14,padding:'12px 16px',fontSize:12,color:'#437126',fontWeight:700,fontStyle:'italic'}}>"{days[dayKey].note}"</div>}
                </div>
              ) : (
                <div style={{background:'#fff',borderRadius:20,padding:18,boxShadow:'0 3px 12px rgba(0,0,0,.08)',border:'2px solid #e8f0d8',marginTop:16}}>
                  <div style={{fontSize:11,fontWeight:900,textTransform:'uppercase',letterSpacing:1,color:'#6b8c42',marginBottom:12}}>✏️ My Reflection</div>
                  <div style={{display:'flex',justifyContent:'space-around',background:'#f8f6f0',borderRadius:12,padding:'10px',marginBottom:10}}>
                    {['😐','🙂','😊','🥰','🤩'].map((e,i) => (
                      <button key={i} onClick={()=>setEmojiPick(i+1)} style={{fontSize:26,background:emojiPick===i+1?'#ffe082':'none',border:'none',cursor:'pointer',padding:6,borderRadius:10,transform:emojiPick===i+1?'scale(1.25)':'scale(1)',transition:'all .15s'}}>
                        {e}
                      </button>
                    ))}
                  </div>
                  {emojiPick>0 && <div style={{textAlign:'center',fontSize:11,fontWeight:900,color:'#437126',marginBottom:10}}>{EMOJI_LABELS[emojiPick]}</div>}
                  <textarea value={note} onChange={e=>setNote(e.target.value)} rows={3} placeholder="Share what happened, what you noticed, or how it felt…"
                    style={{width:'100%',border:'2px solid #d4e8b8',borderRadius:12,padding:12,fontSize:13,fontFamily:"'Quicksand',sans-serif",fontWeight:700,color:'#1a2e1a',resize:'none',outline:'none',background:'#fcfbf6',boxSizing:'border-box'}}/>
                  <button onClick={submitDay} disabled={submitting} style={{display:'block',width:'100%',marginTop:12,background:'linear-gradient(135deg,#43a047,#2e7d32)',color:'#fff',border:'none',borderRadius:50,padding:14,fontSize:15,fontWeight:900,cursor:'pointer',boxShadow:'0 4px 14px rgba(46,125,50,.35)',borderBottom:'3px solid #1b5e20',fontFamily:"'Quicksand',sans-serif"}}>
                    {submitting ? '✨ Saving…' : '✅ I Reflected On This'}
                  </button>
                  <button onClick={markMissed} style={{display:'block',width:'100%',marginTop:8,background:'none',border:'2px solid #ffcdd2',borderRadius:50,padding:10,fontSize:12,fontWeight:900,color:'#e53935',cursor:'pointer',fontFamily:"'Quicksand',sans-serif"}}>
                    ❌ Not today
                  </button>
                </div>
              )}
            </>
          )}

          {done >= 30 && (
            <button onClick={goCert} style={{display:'block',width:'100%',marginTop:16,background:'linear-gradient(135deg,#DCAE1D,#b88c00)',color:'#fff',border:'none',borderRadius:50,padding:15,fontSize:16,fontWeight:900,cursor:'pointer',borderBottom:'3px solid #8a6400',fontFamily:"'Quicksand',sans-serif"}}>
              🏅 Get Your Certificate
            </button>
          )}
        </div>
      )}

      {/* ROADMAP TAB */}
      {tab === 'roadmap' && (
        <div style={{padding:'16px 14px'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,background:'#fff',borderRadius:12,padding:10,marginBottom:12,boxShadow:'0 2px 8px rgba(0,0,0,.06)'}}>
            {[['#e8f5e9','#2e7d32','⭐ Done'],['#fff8e1','#f57c00','● Active'],['#f5f5f5','#999','🔒 Locked']].map(([bg,col,label],i)=>(
              <div key={i} style={{background:bg,borderRadius:8,padding:'6px 4px',textAlign:'center',fontSize:10,fontWeight:900,color:col}}>{label}</div>
            ))}
          </div>
          <div style={{background:'#fff',borderRadius:20,padding:18,boxShadow:'0 3px 12px rgba(0,0,0,.08)',display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10}}>
            {Array.from({length:30},(_,i)=>i+1).map(d => {
              const dayDone = days['day'+d]&&days['day'+d].status==='done';
              const isCur  = d === (findCurDay(user));
              const unl    = d===1 || days['day'+(d-1)]&&days['day'+(d-1)].status==='done';
              return (
                <div key={d} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                  <button onClick={()=>{if(dayDone||isCur){setCurDay(d);setTab('today');}}} style={{
                    width:42,height:42,borderRadius:'50%',border:'none',cursor: dayDone||unl?'pointer':'default',
                    fontWeight:900,fontSize:12,
                    background: dayDone ? 'linear-gradient(135deg,#43a047,#2e7d32)' : isCur ? 'linear-gradient(135deg,#DCAE1D,#b88c00)' : '#f0f0f0',
                    color: dayDone||isCur ? '#fff' : '#bbb',
                    boxShadow: dayDone||isCur ? '0 2px 8px rgba(0,0,0,.15)' : 'none',
                    animation: isCur ? 'pulseCta 2s infinite' : 'none',
                    position:'relative'
                  }}>
                    {dayDone ? d : isCur ? d : '🔒'}
                    {dayDone && <span style={{position:'absolute',top:-2,right:-2,fontSize:8,color:'#fdd835'}}>⭐</span>}
                  </button>
                  <span style={{fontSize:8,fontWeight:900,color: isCur?'#b88c00':'#aaa'}}>D{d}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* HISTORY TAB */}
      {tab === 'history' && (
        <div style={{padding:'16px 14px'}}>
          {Object.keys(days).length === 0 ? (
            <div style={{textAlign:'center',padding:40,color:'#aaa'}}>
              <div style={{fontSize:40,marginBottom:10}}>📋</div>
              <div style={{fontSize:13,fontWeight:700}}>Day 1 is your fresh start! 🌱</div>
            </div>
          ) : (
            Array.from({length:30},(_,i)=>i+1).filter(d=>days['day'+d]).reverse().map(d => {
              const day = days['day'+d];
              const task = TASKS[d-1];
              const isDone = day.status==='done';
              return (
                <div key={d} style={{background:'#fff',borderRadius:16,padding:'12px 14px',boxShadow:'0 2px 8px rgba(0,0,0,.07)',marginBottom:10,borderLeft:`5px solid ${isDone?'#43a047':'#e53935'}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{fontFamily:'Georgia,serif',fontSize:16,color:'#888',minWidth:34,textAlign:'center'}}>D{d}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:'#1a2e1a',fontWeight:700,lineHeight:1.3}}>{task.emoji} {task.text.substring(0,60)}…</div>
                      {isDone && day.note && <div style={{fontSize:11,color:'#666',fontStyle:'italic',marginTop:3}}>"{day.note}"</div>}
                    </div>
                    <div>
                      {isDone ? <span style={{fontSize:18}}>{day.emoji||'✅'}</span>
                        : <button onClick={()=>retryDay(d)} style={{background:'#fff8e1',border:'none',borderRadius:20,padding:'3px 10px',fontSize:10,fontWeight:900,color:'#f57c00',cursor:'pointer',fontFamily:"'Quicksand',sans-serif"}}>↩ Retry</button>}
                    </div>
                  </div>
                </div>
              );
            })
          )}
        </div>
      )}
    </div>
  );
}

// CERTIFICATE

        <div style={{fontSize:54,marginBottom:8}}>🏅</div>
        <div style={{fontFamily:'Georgia,serif',fontSize:26,color:'#224012',letterSpacing:3,marginBottom:2}}>Abhinandhana Patra</div>
        <div style={{fontSize:10,fontWeight:900,textTransform:'uppercase',letterSpacing:3,color:'#8a6400',marginBottom:14}}>Certificate · ULLASA Joyful Parenting</div>
        <div style={{fontSize:12,color:'#666',fontWeight:700,marginBottom:4}}>This is to proudly certify that</div>

        <div style={{fontSize:10,fontWeight:900,color:'#224012',lineHeight:2}}>
          <strong>Facilitator:</strong> Kanile, Bengaluru<br/>
          <strong>Content Partner:</strong> Ranga Miditha, Chanagiri<br/>

        <div style={{fontSize:10,color:'#aaa',marginTop:4}}>📞 95389 98263 | 8762954080 | 7406544999</div>

        🖨️ Print / Save as PDF

// ══════════════════════════════════════════════════════════════════════
// ADMIN PANEL
// ══════════════════════════════════════════════════════════════════════
function AdminPage({ goBack }) {
  const [authed, setAuthed]   = useState(false);
  const [adminInfo, setAdminInfo] = useState(null);
  const [mobile, setMobile]   = useState('');
  const [err, setErr]         = useState('');
  const [parents, setParents] = useState([]);
  const [loading, setLoading] = useState(false);
  const [search, setSearch]   = useState('');
  const [detail, setDetail]   = useState(null);

  const login = () => {
    const m = mobile.replace(/\D/g,'');
    const admin = ADMIN_CREDENTIALS[m];
    if (!admin) { setErr('This number is not authorised.'); return; }
    setAdminInfo({...admin, mobile:m});
    setAuthed(true);
    loadData();
  };

  const loadData = async () => {
    setLoading(true);
    const shared = await storagePull();
    const local  = loadLocal();
    const merged = { ...shared };
    Object.entries(local).forEach(([m,u]) => {
      if (!merged[m]) merged[m] = u;
      else {
        const ld = Object.values(u.days||{}).filter(d=>d&&d.status==='done').length;
        const sd = Object.values(merged[m].days||{}).filter(d=>d&&d.status==='done').length;
        if (ld >= sd) merged[m] = { ...merged[m], ...u };
      }
    });
    const list = Object.values(merged).sort((a,b) => {
      const da = Object.values(b.days||{}).filter(d=>d&&d.status==='done').length;
      const db = Object.values(a.days||{}).filter(d=>d&&d.status==='done').length;
      return da - db;
    });
    setParents(list);
    setLoading(false);
  };

  const filtered = parents.filter(p =>
    !search || p.name.toLowerCase().includes(search.toLowerCase()) || p.mobile.includes(search)
  );

  const total    = parents.length;
  const active   = parents.filter(p=>Object.values(p.days||{}).some(d=>d&&d.status==='done')).length;
  const complete = parents.filter(p=>Object.values(p.days||{}).filter(d=>d&&d.status==='done').length>=30).length;

  const exportWA = () => {
    const lines = [
      '*ULLASA Joyful Parenting — School Report*',
      '_Sahitya School, Shidlaghatta_','',
      `📊 *Total Registered:* ${total}`,
      `✅ *Active Parents:* ${active}`,
      `🏅 *Completed 30 Days:* ${complete}`,'',
      '*Parent Progress:*',
      ...parents.slice(0,20).map(p=>{
        const d=Object.values(p.days||{}).filter(x=>x&&x.status==='done').length;
        return `• ${p.name} (${p.mobile}) — ${d}/30 days`;
      }),
      parents.length>20?`_...and ${parents.length-20} more_`:'',
      '','_Generated from ULLASA App_'
    ];
    window.open(`https://wa.me/?text=${encodeURIComponent(lines.join('\n'))}`, '_blank');
  };

  if (!authed) return (
    <div style={{maxWidth:480,margin:'0 auto',padding:16}}>
      <div style={{background:'linear-gradient(135deg,#224012,#437126)',borderRadius:'20px 20px 0 0',padding:'16px 20px',display:'flex',alignItems:'center',gap:12}}>
        <button onClick={goBack} style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',width:32,height:32,borderRadius:'50%',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900}}>←</button>
        <div>
          <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(220,174,29,.2)',borderRadius:20,padding:'3px 12px',fontSize:10,fontWeight:900,letterSpacing:2,color:'#DCAE1D',textTransform:'uppercase'}}>🛡️ School Admin</div>
          <div style={{fontFamily:'Georgia,serif',fontSize:20,color:'#DCAE1D',letterSpacing:2,marginTop:4}}>ULLASA Records</div>
        </div>
      </div>
      <div style={{background:'#fff',borderRadius:'0 0 20px 20px',padding:'22px 20px 24px',boxShadow:'0 6px 24px rgba(67,113,38,.15)'}}>
        <p style={{fontSize:12,color:'#666',fontWeight:700,marginBottom:20}}>Sahitya School · Parent Progress Dashboard</p>
        <div style={{fontSize:10,fontWeight:900,textTransform:'uppercase',letterSpacing:1,color:'#6b8c42',marginBottom:5}}>Your Mobile Number</div>
        <input type="tel" value={mobile} onChange={e=>setMobile(e.target.value)} placeholder="Enter your registered mobile number" maxLength={15}
          onKeyDown={e=>e.key==='Enter'&&login()}
          style={{width:'100%',border:'2.5px solid #d4e8b8',borderRadius:12,padding:'12px 14px',fontSize:15,fontFamily:"'Quicksand',sans-serif",outline:'none',fontWeight:700,background:'#fcfbf6',color:'#1a2e1a',marginBottom:6,boxSizing:'border-box'}}/>
        <p style={{fontSize:10,color:'#aaa',fontWeight:700,marginBottom:12}}>Only authorised numbers can access school records.</p>
        {err && <div style={{color:'#e53935',fontSize:11,fontWeight:900,marginBottom:10,textAlign:'center'}}>{err}</div>}
        <button onClick={login} style={{display:'block',width:'100%',background:'linear-gradient(135deg,#224012,#437126)',color:'#fff',border:'none',borderRadius:50,padding:15,fontSize:16,fontWeight:900,cursor:'pointer',fontFamily:"'Quicksand',sans-serif"}}>
          🔓 Open Dashboard
        </button>
        <div style={{marginTop:16,fontSize:11,color:'#aaa',textAlign:'center',fontWeight:700}}>Authorised: Sahitya School · Krishna · Aruna BT · Roopa</div>
      </div>
    </div>
  );

  return (
    <div style={{maxWidth:480,margin:'0 auto',padding:14,paddingBottom:60}}>
      {/* Admin topbar */}
      <div style={{background:'linear-gradient(135deg,#224012,#1b5e20)',borderRadius:18,padding:'14px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,boxShadow:'0 4px 14px rgba(34,64,18,.25)'}}>
        <div>
          <div style={{fontFamily:'Georgia,serif',fontSize:18,color:'#DCAE1D',letterSpacing:2}}>School Records</div>
          <div style={{fontSize:10,color:'#DCAE1D',fontWeight:900,marginTop:2}}>{adminInfo&&adminInfo.name} · {adminInfo&&adminInfo.role}</div>
          <div style={{fontSize:10,color:'#a5d6a7',fontWeight:700,marginTop:1}}>{loading?'Syncing…':`${total} parents · Live`}</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button onClick={loadData} style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',padding:'5px 10px',borderRadius:20,fontSize:10,fontWeight:900,cursor:'pointer',fontFamily:"'Quicksand',sans-serif"}}>↻ Refresh</button>
          <button onClick={()=>setAuthed(false)} style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',padding:'5px 10px',borderRadius:20,fontSize:10,fontWeight:900,cursor:'pointer',fontFamily:"'Quicksand',sans-serif"}}>Logout</button>
        </div>
      </div>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:14}}>
        {[['Total',total,'#224012'],['Active',active,'#437126'],['Complete',complete,'#DCAE1D']].map(([label,val,col])=>(
          <div key={label} style={{background:'#fff',borderRadius:14,padding:'14px 10px',textAlign:'center',boxShadow:'0 2px 10px rgba(0,0,0,.07)',borderBottom:`3px solid ${col}`}}>
            <div style={{fontFamily:'Georgia,serif',fontSize:28,color:'#224012',lineHeight:1}}>{val}</div>
            <div style={{fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:1,color:'#888',marginTop:2}}>{label}</div>
          </div>
        ))}
      </div>

      {/* Search */}
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search by name or mobile…"
        style={{width:'100%',border:'2px solid #d4e8b8',borderRadius:12,padding:'10px 14px',fontSize:14,fontFamily:"'Quicksand',sans-serif",outline:'none',marginBottom:10,fontWeight:700,background:'#fcfbf6',boxSizing:'border-box'}}/>

      {/* Parent list */}
      {loading ? (
        <div style={{textAlign:'center',padding:40,color:'#aaa',fontSize:13,fontWeight:700}}>Loading parent data…</div>
      ) : filtered.length === 0 ? (
        <div style={{textAlign:'center',padding:40,color:'#aaa'}}>
          <div style={{fontSize:40,marginBottom:10}}>📋</div>
          <div style={{fontSize:13,fontWeight:700}}>No parents registered yet.</div>
        </div>
      ) : filtered.map(p => {
        const done = Object.values(p.days||{}).filter(d=>d&&d.status==='done').length;
        const pct  = Math.round(done/30*100);
        return (
          <div key={p.mobile} onClick={()=>setDetail(p)}
            style={{background:'#fff',borderRadius:16,padding:'14px 16px',boxShadow:'0 2px 10px rgba(0,0,0,.07)',marginBottom:10,borderLeft:`5px solid ${done>=30?'#DCAE1D':done>0?'#437126':'#d4e8b8'}`,cursor:'pointer',transition:'all .15s'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
              <div>
                <div style={{fontSize:15,fontWeight:900,color:'#1a2e1a'}}>{p.name} {done>=30?'🏅':''}</div>
                <div style={{fontSize:11,color:'#888',fontWeight:700}}>📱 {p.mobile}{p.city?' · '+p.city:''}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'Georgia,serif',fontSize:20,color:'#437126'}}>{done}/30</div>
                <div style={{fontSize:9,fontWeight:900,color:'#888'}}>{pct}%</div>
              </div>
            </div>
            <div style={{background:'#e8f0d8',borderRadius:99,height:8,overflow:'hidden'}}>
              <div style={{height:'100%',borderRadius:99,background:'linear-gradient(90deg,#6ab04c,#437126)',width:pct+'%'}}/>
            </div>
            {p.wardAge && <div style={{fontSize:10,color:'#888',fontWeight:700,marginTop:4}}>Child: {p.wardAge}</div>}
          </div>
        );
      })}

      {/* Export */}
      <button onClick={exportWA} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:'linear-gradient(135deg,#25D366,#128C7E)',color:'#fff',border:'none',borderRadius:50,padding:'12px 20px',fontSize:13,fontWeight:900,cursor:'pointer',width:'100%',marginTop:10,boxShadow:'0 4px 14px rgba(37,211,102,.3)',fontFamily:"'Quicksand',sans-serif"}}>
        💬 Export Summary to WhatsApp
      </button>

      {/* Detail modal */}
      {detail && (
        <div onClick={e=>e.target===e.currentTarget&&setDetail(null)} style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.6)',zIndex:400,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
          <div style={{background:'#fff',borderRadius:'24px 24px 0 0',width:'100%',maxWidth:520,padding:'20px 18px 40px',maxHeight:'85vh',overflowY:'auto',boxShadow:'0 -8px 32px rgba(0,0,0,.2)'}}>
            <div style={{width:40,height:4,background:'#ddd',borderRadius:2,margin:'0 auto 16px'}}/>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:18,fontWeight:900,color:'#1a2e1a'}}>{detail.name}</div>
              <div style={{fontSize:12,color:'#888',fontWeight:700}}>📱 {detail.mobile}{detail.city?' · '+detail.city:''}</div>
              {detail.wardAge && <div style={{fontSize:11,color:'#437126',fontWeight:800,marginTop:2}}>Child: {detail.wardAge}</div>}
            </div>
            {Array.from({length:30},(_,i)=>i+1).filter(d=>detail.days&&detail.days['day'+d]).map(d=>{
              const day = detail.days['day'+d];
              const task = TASKS[d-1];
              const isDone = day.status==='done';
              return (
                <div key={d} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 12px',borderRadius:12,background:isDone?'#f8f6f0':'#fff5f5',marginBottom:8,borderLeft:`3px solid ${isDone?'#43a047':'#e53935'}`}}>
                  <div style={{fontFamily:'Georgia,serif',fontSize:14,color:'#888',minWidth:28}}>D{d}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,color:'#3a2800',fontWeight:700,lineHeight:1.4}}>{task.emoji} {task.text.substring(0,70)}…</div>
                    {isDone && day.note && <div style={{fontSize:10,color:'#666',marginTop:3,fontStyle:'italic'}}>"{day.note}"</div>}
                    {!isDone && <div style={{fontSize:10,color:'#e53935',fontWeight:900,marginTop:2}}>Not done</div>}
                  </div>
                  <div>{isDone ? day.emoji||'✅' : ''}</div>
                </div>
              );
            })}
            <button onClick={()=>setDetail(null)} style={{display:'block',width:'100%',marginTop:12,background:'#f0f0f0',border:'none',borderRadius:50,padding:12,fontSize:13,fontWeight:900,cursor:'pointer',fontFamily:"'Quicksand',sans-serif",color:'#666'}}>Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════════════════
function Toast({ msg, type }) {
  const bg = type==='warn'?'#e53935':type==='success'?'#43a047':'#437126';
  return (
    <div style={{position:'fixed',bottom:90,left:'50%',transform:'translateX(-50%)',background:bg,color:'#fff',padding:'10px 20px',borderRadius:50,fontSize:13,fontWeight:900,boxShadow:'0 4px 14px rgba(0,0,0,.25)',zIndex:500,whiteSpace:'nowrap'}}>
      {msg}
    </div>
  );
}

function Confetti({ onDone }) {
  useEffect(()=>{ const t=setTimeout(onDone, 3000); return ()=>clearTimeout(t); },[onDone]);
  const colors = ['#DCAE1D','#437126','#e53935','#1976d2','#9c27b0','#ff7043'];
  return (
    <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,pointerEvents:'none',zIndex:600,overflow:'hidden'}}>
      <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center'}}>
        <div style={{fontSize:60,animation:'bounce 0.5s ease infinite alternate'}}>💐</div>
        <div style={{fontFamily:'Georgia,serif',fontSize:22,color:'#224012',fontWeight:900,marginTop:8}}>Beautiful! 🌟</div>
        <div style={{fontSize:13,color:'#666',fontWeight:700,marginTop:4}}>Reflection saved · Next question unlocked!</div>
      </div>
      {Array.from({length:50}).map((_,i)=>(
        <div key={i} style={{
          position:'absolute',
          width: 6+Math.random()*10,
          height: 6+Math.random()*10,
          borderRadius: Math.random()>.5?'50%':'2px',
          background: colors[Math.floor(Math.random()*colors.length)],
          left: Math.random()*100+'%',
          top: -20,
          animation:`fall${i} ${1.5+Math.random()*1.5}s ease-in ${Math.random()*0.5}s forwards`,
        }}/>
      ))}
      <style>{`
        @keyframes bounce { to { transform: translateY(-10px); } }
        ${Array.from({length:50}).map((_,i)=>`
          @keyframes fall${i} {
            to { transform: translateY(110vh) rotate(${Math.random()*720}deg); opacity:0; }
          }
        `).join('')}
        @keyframes floatB { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        @keyframes pulseCta { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
      `}</style>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
